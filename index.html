<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Renovasi Rumah</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 5px; font-size: 22px; } 
        .subtitle { text-align: center; color: #7f8c8d; font-size: 13px; margin-top: 0; margin-bottom: 20px; font-style: italic; } 
        
        .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
        .form-row .form-group { flex: 1; margin-bottom: 0; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 10px; background-color: #3498db; color: white; border: none; border-radius: 4px; font-size: 15px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #2980b9; }
        
        .summary { margin-top: 20px; padding: 15px; background: #ecf0f1; border-radius: 4px; font-size: 15px; }
        .summary div { padding: 8px 0; border-bottom: 1px solid #bdc3c7; font-weight: bold; }
        .summary div:last-child { border-bottom: none; }
        .summary span { float: right; } 
        .masuk { color: #27ae60; }
        .keluar { color: #c0392b; }

        /* PEMBARUAN CSS: Header Riwayat & Filter Box */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-top: 25px; margin-bottom: 10px; border-bottom: 2px solid #3498db; padding-bottom: 5px; }
        .header-container h3 { margin: 0; font-size: 16px; color: #2c3e50; }
        .btn-filter { width: auto; padding: 5px 12px; font-size: 13px; background-color: #f39c12; }
        .btn-filter:hover { background-color: #e67e22; }
        
        .filter-box { display: none; background: #fdfefe; padding: 12px; border-radius: 4px; border: 1px solid #bdc3c7; margin-bottom: 15px; }
        
        /* Tabel Scroll */
        .table-container { 
            max-height: 250px; 
            overflow-y: auto; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { padding: 8px 5px; text-align: left; border-bottom: 1px solid #ddd; }
        
        th { 
            background-color: #f8f9fa; 
            position: sticky; 
            top: 0; 
            z-index: 1; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.1); 
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Pencatatan Pembuatan Gudang</h2>
    <p class="subtitle">Langensari 2026</p>

    <form id="transactionForm">
        <div class="form-row">
            <div class="form-group">
                <label for="tanggal">Tanggal</label>
                <input type="date" id="tanggal" required>
            </div>
            <div class="form-group">
                <label for="type">Transaksi</label>
                <select id="type" required>
                    <option value="" disabled selected>-- Pilih --</option>
                    <option value="masuk">Masuk</option>
                    <option value="keluar">Keluar</option>
                </select>
            </div>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="amount">Nominal (Rp)</label>
                <input type="text" id="amount" placeholder="Cth: 50.000" required>
            </div>
            <div class="form-group">
                <label for="description">Keterangan</label>
                <input type="text" id="description" placeholder="Cth: Beli semen" required>
            </div>
        </div>
        <button type="submit" id="submitBtn">Simpan Catatan</button>
    </form>

    <div class="summary">
        <div>Total Masuk: <span class="masuk" id="totalMasuk">Rp 0</span></div>
        <div>Total Belanja: <span class="keluar" id="totalKeluar">Rp 0</span></div>
        <div>Sisa Saldo: <span id="saldoAkhir">Rp 0</span></div>
    </div>

    <div class="header-container">
        <h3>Riwayat Pencatatan</h3>
        <button type="button" id="toggleFilterBtn" class="btn-filter">📅 Filter</button>
    </div>

    <div id="filterBox" class="filter-box">
        <div class="form-row">
            <div class="form-group">
                <label>Dari Tanggal</label>
                <input type="date" id="filterStart">
            </div>
            <div class="form-group">
                <label>Sampai Tanggal</label>
                <input type="date" id="filterEnd">
            </div>
        </div>
        <div class="form-row" style="margin-bottom: 0;">
            <button type="button" id="applyFilterBtn" style="background-color: #27ae60;">Terapkan</button>
            <button type="button" id="resetFilterBtn" style="background-color: #95a5a6;">Reset</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Keterangan</th>
                    <th>Masuk</th>
                    <th>Keluar</th>
                </tr>
            </thead>
            <tbody id="tableBody">
            </tbody>
        </table>
    </div>
</div>

<script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    // Kredensial Supabase Anda
    const supabaseUrl = 'https://ephcczlqvtihmbowqxdt.supabase.co';
    const supabaseKey = 'sb_publishable_elmpHYmIc8lj1q5tBchO6w_aM66d9Bf';
    const supabase = createClient(supabaseUrl, supabaseKey);

    const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(angka);
    
    const formatDate = (dateString) => {
        if (!dateString) return '';
        const options = { day: 'numeric', month: 'short', year: '2-digit' };
        return new Date(dateString).toLocaleDateString('id-ID', options);
    };

    const tglInput = document.getElementById('tanggal');
    const today = new Date().toISOString().split('T')[0];
    tglInput.value = today;

    const amountInput = document.getElementById('amount');
    amountInput.addEventListener('input', function(e) {
        let value = this.value.replace(/[^0-9]/g, '');
        this.value = value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    });

    // VARIABEL GLOBAL UNTUK MENYIMPAN FILTER TANGGAL
    let filterStartDate = '';
    let filterEndDate = '';

    // LOGIKA TOMBOL FILTER
    document.getElementById('toggleFilterBtn').addEventListener('click', () => {
        const fBox = document.getElementById('filterBox');
        fBox.style.display = (fBox.style.display === 'none' || fBox.style.display === '') ? 'block' : 'none';
    });

    document.getElementById('applyFilterBtn').addEventListener('click', () => {
        filterStartDate = document.getElementById('filterStart').value;
        filterEndDate = document.getElementById('filterEnd').value;
        
        if(!filterStartDate || !filterEndDate) {
            alert('Harap pilih "Dari Tanggal" dan "Sampai Tanggal"!');
            return;
        }
        fetchTransactions(); // Panggil ulang data dengan filter
    });

    document.getElementById('resetFilterBtn').addEventListener('click', () => {
        document.getElementById('filterStart').value = '';
        document.getElementById('filterEnd').value = '';
        filterStartDate = '';
        filterEndDate = '';
        
        // Tutup kotak filternya
        document.getElementById('filterBox').style.display = 'none'; 
        fetchTransactions(); // Panggil ulang semua data (tanpa filter)
    });

    async function fetchTransactions() {
        // Query dasar
        let query = supabase
            .from('transactions')
            .select('*')
            .order('id', { ascending: false });

        // JIKA ADA FILTER TANGGAL YANG AKTIF, TAMBAHKAN KE QUERY SUPABASE
        if (filterStartDate && filterEndDate) {
            query = query
                .gte('created_at', `${filterStartDate} 00:00:00`)
                .lte('created_at', `${filterEndDate} 23:59:59`);
        }

        const { data, error } = await query;

        if (error) {
            console.error('Error fetching data:', error);
            return;
        }
        renderTable(data);
    }

    function renderTable(data) {
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';
        
        let totalMasuk = 0;
        let totalKeluar = 0;

        data.forEach(tx => {
            const tr = document.createElement('tr');
            const amt = parseFloat(tx.amount);
            
            if (tx.type === 'masuk') {
                totalMasuk += amt;
                tr.innerHTML = `
                    <td>${formatDate(tx.created_at)}</td>
                    <td>${tx.description}</td>
                    <td class="masuk">${formatRupiah(amt)}</td>
                    <td>-</td>
                `;
            } else {
                totalKeluar += amt;
                tr.innerHTML = `
                    <td>${formatDate(tx.created_at)}</td>
                    <td>${tx.description}</td>
                    <td>-</td>
                    <td class="keluar">${formatRupiah(amt)}</td>
                `;
            }
            tableBody.appendChild(tr);
        });

        document.getElementById('totalMasuk').innerText = formatRupiah(totalMasuk);
        document.getElementById('totalKeluar').innerText = formatRupiah(totalKeluar);
        document.getElementById('saldoAkhir').innerText = formatRupiah(totalMasuk - totalKeluar);
    }

    document.getElementById('transactionForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const submitBtn = document.getElementById('submitBtn');
        submitBtn.innerText = 'Menyimpan...';
        submitBtn.disabled = true;

        const tanggalInput = document.getElementById('tanggal').value;
        const now = new Date();
        const jam = String(now.getHours()).padStart(2, '0');
        const menit = String(now.getMinutes()).padStart(2, '0');
        const detik = String(now.getSeconds()).padStart(2, '0');
        
        const created_at_lengkap = `${tanggalInput} ${jam}:${menit}:${detik}`;
        const type = document.getElementById('type').value;
        const description = document.getElementById('description').value;
        
        const rawAmount = document.getElementById('amount').value;
        const amount = rawAmount.replace(/\./g, ''); 

        const { error } = await supabase
            .from('transactions')
            .insert([{ created_at: created_at_lengkap, type, amount, description }]);

        if (error) {
            alert('Gagal menyimpan data!');
            console.error(error);
        } else {
            document.getElementById('amount').value = '';
            document.getElementById('description').value = '';
            document.getElementById('amount').focus();
        }

        submitBtn.innerText = 'Simpan Catatan';
        submitBtn.disabled = false;
    });

    supabase.channel('custom-all-channel')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, (payload) => {
          fetchTransactions();
      })
      .subscribe();

    fetchTransactions();
</script>
</body>
</html>
